name: Deploy API

on:
  workflow_dispatch:
  push:
    branches:
      - staging
      - main
    paths:
      - "apps/api/**"
      - "packages/protocol/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-api.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    env:
      DEPLOY_ENV: ${{ github.ref_name == 'main' && 'production' || 'staging' }}

    steps:
      - name: Validate release ref
        run: |
          if [[ "$GITHUB_REF_NAME" != "staging" && "$GITHUB_REF_NAME" != "main" ]]; then
            echo "This workflow may only run from staging or main. Current ref: $GITHUB_REF_NAME"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.2.2 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check API
        run: pnpm --filter @anidachi/api check

      - name: Test API
        run: pnpm --filter @anidachi/api test

      - name: Dry-run Worker deploy
        working-directory: apps/api
        run: pnpm exec wrangler deploy --env "$DEPLOY_ENV" --dry-run --outdir /tmp/anidachi-worker-dry-run

      - name: Deploy Worker
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy --env "$DEPLOY_ENV"
