name: E2E P2P Media

# Block 1.5 of docs/superpowers/plans/2026-06-12-room-flow-p2p-flawless-execution-plan.md
# Real-WebRTC two-browser P2P harness (Chromium fake media + wrangler dev).
# Non-required at first; promote to required after it proves stable.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  pull_request:
    branches:
      - staging
      - main
    paths:
      - "apps/api/**"
      - "apps/extension/src/p2p-media.ts"
      - "apps/extension/src/room-client.ts"
      - "apps/extension/src/p2p-ice.ts"
      - "packages/protocol/**"
      - "tests/e2e/**"
      - ".github/workflows/e2e-p2p-media.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  p2p-media:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.2.2 --activate

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install e2e harness dependencies
        working-directory: tests/e2e
        run: npm install

      - name: Install Playwright Chromium
        working-directory: tests/e2e
        run: npx playwright install --with-deps chromium

      - name: Run real-WebRTC P2P harness
        working-directory: tests/e2e
        run: node p2p-media-harness.mjs
