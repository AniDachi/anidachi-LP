name: Deploy migrations to staging

# Applies any new Supabase migrations to the STAGING project whenever they land
# on the `staging` branch. `supabase db push` only applies migrations that are
# not already in the remote history, so pushes with no new migration are no-ops.
on:
  push:
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: db-migrate-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.STAGING_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link staging project
        run: supabase --workdir apps/web link --project-ref "$SUPABASE_PROJECT_ID"
      - name: Show pending migrations (dry run)
        run: supabase --workdir apps/web db push --dry-run
      - name: Apply migrations
        run: supabase --workdir apps/web db push
