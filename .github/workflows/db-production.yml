name: Deploy migrations to production

# Applies any new Supabase migrations to the PRODUCTION project whenever they
# land on `main` (i.e. when a staging -> main promotion is merged). `supabase db
# push` only applies migrations not already in the remote history, so a push
# with no new migration is a no-op.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: db-migrate-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.PRODUCTION_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.PRODUCTION_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link production project
        run: supabase --workdir apps/web link --project-ref "$SUPABASE_PROJECT_ID"
      - name: Show pending migrations (dry run)
        run: supabase --workdir apps/web db push --dry-run
      - name: Apply migrations
        run: supabase --workdir apps/web db push
