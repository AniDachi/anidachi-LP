name = "anidachi-api"
main = "src/index.ts"
compatibility_date = "2026-05-23"
compatibility_flags = ["nodejs_compat"]

[vars]
ANIDACHI_ENV = "local"

[[durable_objects.bindings]]
name = "ROOMS"
class_name = "RoomDurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDurableObject"]

[[analytics_engine_datasets]]
binding = "ROOM_ANALYTICS"
dataset = "anidachi_room_events"

[env.staging]
name = "anidachi-api-staging"
workers_dev = true

[env.staging.vars]
ANIDACHI_ENV = "staging"

[[env.staging.durable_objects.bindings]]
name = "ROOMS"
class_name = "RoomDurableObject"

[[env.staging.analytics_engine_datasets]]
binding = "ROOM_ANALYTICS"
dataset = "anidachi_room_events_staging"

[env.production]
name = "anidachi-api-production"
workers_dev = true

[env.production.vars]
ANIDACHI_ENV = "production"

[[env.production.durable_objects.bindings]]
name = "ROOMS"
class_name = "RoomDurableObject"

[[env.production.analytics_engine_datasets]]
binding = "ROOM_ANALYTICS"
dataset = "anidachi_room_events_production"
